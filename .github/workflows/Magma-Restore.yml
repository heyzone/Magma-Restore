name: Magmanode Restore

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/MagmaRestore-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # WARP（提供干净 IP）
      # =========================
      - name: 创建 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 系统依赖
      # xvfb（patchright headed 模式必须）
      # =========================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb wget unzip curl jq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2 libpango-1.0-0 libcairo2
          echo "✅ 系统依赖安装完成"

      # =========================
      # Node 依赖
      # patchright：处理 Cloudflare Turnstile（登录页）
      # form-data：TG 发送截图
      # =========================
      - name: 安装 Node 依赖
        run: |
          cd scripts
          npm init -y
          npm install patchright form-data
          npx patchright install chrome
          echo "✅ patchright 安装完成"

      # =========================
      # 准备脚本
      # =========================
      - name: 准备 restore.js
        run: |
          ls scripts/restore.js && echo "✅ restore.js 就绪" || \
            (echo "❌ 未找到 restore.js" && exit 1)

      - name: 检查 IP
        run: |
          echo "🌍 IP: $(curl -s https://api.ipify.org)"
          curl -s https://ipinfo.io | jq '{ip,city,country,org}' 2>/dev/null || true

      # =========================
      # 运行
      # patchright headed 模式需要 xvfb-run 提供虚拟显示
      # =========================
      - name: 运行 restore.js
        env:
          MAGMA_USERNAME: ${{ secrets.MAGMA_USERNAME }}
          MAGMA_PASSWORD: ${{ secrets.MAGMA_PASSWORD }}
          TG_TOKEN:       ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:     ${{ secrets.TG_CHAT_ID }}
          MAX_RETRY:      "3"
        run: |
          mkdir -p scripts/screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x900x24 -ac" \
            node scripts/restore.js
        continue-on-error: true

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: magmanode-screenshots-${{ github.run_id }}
          path: scripts/screenshots/
          if-no-files-found: warn
          retention-days: 7
